<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>99 Knights in the Forest — Spelling Adventure</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=MedievalSharp&family=Nunito:wght@400;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Nunito', sans-serif;
  overflow: hidden;
  height: 100vh;
  height: 100dvh;
  background: #1a2e1a;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
  -webkit-touch-callout: none;
}

canvas {
  display: block;
}

#game-container {
  position: relative;
  width: 100vw;
  height: 100vh;
  height: 100dvh;
}

#ui-layer {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}

#ui-layer * {
  pointer-events: auto;
}

#title-screen {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(180deg, #0d1f0d 0%, #1a3a1a 40%, #2d5a2d 100%);
  z-index: 100;
  padding: 1rem;
  overflow-y: auto;
}

#title-screen h1 {
  font-family: 'MedievalSharp', cursive;
  font-size: clamp(2rem, 8vw, 4rem);
  color: #f0d060;
  text-shadow: 0 0 20px rgba(240, 208, 96, 0.5), 2px 2px 0 #5a3a00;
  margin-bottom: 0.3rem;
  text-align: center;
}

#title-screen .subtitle {
  font-size: clamp(1rem, 3.5vw, 1.4rem);
  color: #a0c8a0;
  margin-bottom: 1.5rem;
}

.choose-text {
  color: #8ab88a;
  margin-bottom: 1rem;
  font-size: clamp(0.85rem, 2.5vw, 1rem);
}

.character-select {
  display: flex;
  gap: clamp(0.6rem, 2vw, 2rem);
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
  justify-content: center;
}

.char-option {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: clamp(0.8rem, 2vw, 1.5rem);
  border: 3px solid #4a6a4a;
  border-radius: 16px;
  background: rgba(30, 60, 30, 0.8);
  cursor: pointer;
  transition: all 0.3s;
  min-width: clamp(90px, 22vw, 140px);
}

.char-option:hover {
  border-color: #f0d060;
  background: rgba(50, 80, 50, 0.9);
  transform: translateY(-5px);
}

.char-option.selected {
  border-color: #f0d060;
  background: rgba(60, 90, 40, 0.9);
  box-shadow: 0 0 20px rgba(240, 208, 96, 0.3);
}

.char-option .emoji {
  font-size: clamp(2.2rem, 7vw, 3.5rem);
  margin-bottom: 0.3rem;
}

.char-option .name {
  font-family: 'MedievalSharp', cursive;
  font-size: clamp(0.95rem, 2.5vw, 1.3rem);
  color: #e0d0a0;
}

.char-option .desc {
  font-size: clamp(0.65rem, 1.8vw, 0.8rem);
  color: #8ab88a;
  margin-top: 4px;
}

#start-btn {
  font-family: 'MedievalSharp', cursive;
  font-size: clamp(1.3rem, 4vw, 1.8rem);
  padding: 0.7rem 2.5rem;
  background: linear-gradient(180deg, #c8a030, #a07820);
  color: #fff;
  border: 3px solid #e0c050;
  border-radius: 12px;
  cursor: pointer;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
  transition: all 0.3s;
}

#start-btn:hover {
  background: linear-gradient(180deg, #e0b840, #b88828);
  transform: scale(1.05);
}

/* HUD */
#hud {
  position: absolute;
  top: 0; left: 0; right: 0;
  display: none;
  justify-content: space-between;
  align-items: center;
  padding: 8px 12px;
  background: linear-gradient(180deg, rgba(10,20,10,0.9), rgba(10,20,10,0));
  flex-wrap: wrap;
  gap: 4px;
}

#hud .score-area {
  display: flex;
  align-items: center;
  gap: 10px;
}

#hud .score {
  font-family: 'MedievalSharp', cursive;
  font-size: clamp(1rem, 3.5vw, 1.5rem);
  color: #f0d060;
}

#hud .streak {
  font-size: clamp(0.8rem, 2.5vw, 1rem);
  color: #ff9944;
}

#hud .level {
  font-family: 'MedievalSharp', cursive;
  font-size: clamp(0.9rem, 3vw, 1.2rem);
  color: #a0d0a0;
}

#hearts {
  font-size: clamp(1rem, 3.5vw, 1.5rem);
  letter-spacing: 2px;
}

/* Spelling Challenge */
#challenge-box {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  display: none;
  flex-direction: column;
  align-items: center;
  background: rgba(15, 30, 15, 0.95);
  border: 3px solid #4a7a4a;
  border-radius: 20px;
  padding: clamp(0.8rem, 2vw, 1.5rem) clamp(1rem, 3vw, 2.5rem);
  width: calc(100% - 16px);
  max-width: 500px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

#challenge-box .encounter-text {
  font-family: 'MedievalSharp', cursive;
  font-size: clamp(0.9rem, 3vw, 1.2rem);
  color: #c0e0c0;
  margin-bottom: 0.3rem;
  text-align: center;
}

#challenge-box .word-hint {
  font-size: clamp(0.8rem, 2.5vw, 1rem);
  color: #90b890;
  margin-bottom: 0.8rem;
  text-align: center;
  max-width: 350px;
}

#letter-display {
  display: flex;
  gap: clamp(4px, 1.2vw, 8px);
  margin-bottom: 0.8rem;
  flex-wrap: wrap;
  justify-content: center;
}

#letter-display .letter-slot {
  width: clamp(32px, 8vw, 44px);
  height: clamp(38px, 9vw, 52px);
  border: 2px solid #5a8a5a;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(1.1rem, 3.5vw, 1.6rem);
  font-weight: 900;
  color: #f0e8c0;
  background: rgba(40, 70, 40, 0.6);
  transition: all 0.2s;
}

#letter-display .letter-slot.filled {
  border-color: #90d060;
  background: rgba(60, 100, 40, 0.8);
}

#letter-display .letter-slot.wrong {
  border-color: #d04040;
  background: rgba(100, 30, 30, 0.6);
  animation: shake 0.4s;
}

#letter-display .letter-slot.correct {
  border-color: #f0d060;
  background: rgba(100, 90, 30, 0.8);
  animation: pop 0.3s;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}

@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

#keyboard {
  display: flex;
  flex-direction: column;
  gap: clamp(3px, 1vw, 6px);
  align-items: center;
  width: 100%;
}

#keyboard .row {
  display: flex;
  gap: clamp(3px, 0.8vw, 5px);
  justify-content: center;
}

#keyboard .key {
  width: clamp(28px, 7.5vw, 38px);
  height: clamp(34px, 9vw, 42px);
  border: 2px solid #4a7a4a;
  border-radius: 6px;
  background: rgba(30, 60, 30, 0.9);
  color: #c0e0c0;
  font-size: clamp(0.85rem, 2.8vw, 1.1rem);
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}

#keyboard .key:hover {
  background: rgba(60, 100, 50, 0.9);
  border-color: #80c060;
}

#keyboard .key:active {
  transform: scale(0.9);
  background: rgba(80, 130, 60, 0.9);
}

/* Result popup */
#result-popup {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: none;
  flex-direction: column;
  align-items: center;
  padding: clamp(1.2rem, 4vw, 2rem) clamp(1.5rem, 5vw, 3rem);
  border-radius: 20px;
  z-index: 50;
  animation: fadeInUp 0.4s;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translate(-50%, -40%); }
  to { opacity: 1; transform: translate(-50%, -50%); }
}

#result-popup.success {
  background: rgba(20, 60, 20, 0.95);
  border: 3px solid #60c060;
}

#result-popup.fail {
  background: rgba(60, 20, 20, 0.95);
  border: 3px solid #c06060;
}

#result-popup .result-icon { font-size: clamp(2rem, 7vw, 3rem); }
#result-popup .result-text {
  font-family: 'MedievalSharp', cursive;
  font-size: clamp(1.2rem, 4vw, 1.6rem);
  margin: 0.5rem 0;
}
#result-popup .result-word {
  font-size: clamp(1rem, 3vw, 1.2rem);
  letter-spacing: 3px;
  font-weight: 900;
}

/* Game Over */
#game-over {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(5, 10, 5, 0.95);
  z-index: 100;
  padding: 1.5rem;
}

#game-over h2 {
  font-family: 'MedievalSharp', cursive;
  font-size: clamp(2rem, 8vw, 3rem);
  color: #f0d060;
  margin-bottom: 1rem;
}

#game-over .final-score {
  font-size: clamp(1.1rem, 4vw, 1.5rem);
  color: #c0e0c0;
  margin-bottom: 0.5rem;
}

#game-over .words-learned {
  font-size: clamp(0.85rem, 2.5vw, 1.1rem);
  color: #8ab88a;
  margin-bottom: 2rem;
  text-align: center;
  max-width: 90%;
  word-wrap: break-word;
}

#play-again-btn {
  font-family: 'MedievalSharp', cursive;
  font-size: clamp(1.2rem, 4vw, 1.5rem);
  padding: 0.7rem 2.5rem;
  background: linear-gradient(180deg, #c8a030, #a07820);
  color: #fff;
  border: 3px solid #e0c050;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s;
}

#play-again-btn:hover {
  background: linear-gradient(180deg, #e0b840, #b88828);
  transform: scale(1.05);
}

/* Walking creature label */
#creature-label {
  position: absolute;
  display: none;
  font-family: 'MedievalSharp', cursive;
  font-size: 1rem;
  color: #f0d060;
  text-shadow: 0 0 8px rgba(0,0,0,0.8);
  pointer-events: none;
}

/* Mobile move hint */
#move-hint {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'MedievalSharp', cursive;
  font-size: clamp(0.9rem, 3vw, 1.1rem);
  color: rgba(160, 200, 160, 0.6);
  pointer-events: none;
  transition: opacity 1s;
}
</style>
</head>
<body>
<div id="game-container">
  <canvas id="game-canvas"></canvas>
  <div id="ui-layer">
    <!-- Title Screen -->
    <div id="title-screen">
      <h1>99 Knights in the Forest</h1>
      <p class="subtitle">A Spelling Adventure</p>
      <p class="choose-text">Choose your knight companion:</p>
      <div class="character-select">
        <div class="char-option selected" data-char="deer">
          <div class="emoji">&#x1F98C;</div>
          <div class="name">Sir Deer</div>
          <div class="desc">Swift & Wise</div>
        </div>
        <div class="char-option" data-char="ram">
          <div class="emoji">&#x1F40F;</div>
          <div class="name">Sir Ram</div>
          <div class="desc">Strong & Brave</div>
        </div>
        <div class="char-option" data-char="cat">
          <div class="emoji">&#x1F408;</div>
          <div class="name">Sir Cat</div>
          <div class="desc">Clever & Quick</div>
        </div>
      </div>
      <button id="start-btn">Begin Quest</button>
    </div>

    <!-- HUD -->
    <div id="hud">
      <div class="score-area">
        <div class="score" id="score-text">Score: 0</div>
        <div class="streak" id="streak-text"></div>
      </div>
      <div id="hearts"></div>
      <div class="level" id="level-text">Forest Clearing</div>
    </div>

    <!-- Spelling Challenge -->
    <div id="challenge-box">
      <div class="encounter-text" id="encounter-text"></div>
      <div class="word-hint" id="word-hint"></div>
      <div id="letter-display"></div>
      <div id="keyboard"></div>
    </div>

    <!-- Result Popup -->
    <div id="result-popup">
      <div class="result-icon" id="result-icon"></div>
      <div class="result-text" id="result-text"></div>
      <div class="result-word" id="result-word"></div>
    </div>

    <!-- Game Over -->
    <div id="game-over">
      <h2>Quest Complete!</h2>
      <div class="final-score" id="final-score"></div>
      <div class="words-learned" id="words-learned"></div>
      <button id="play-again-btn">New Quest</button>
    </div>

    <div id="creature-label"></div>
    <div id="move-hint"></div>
  </div>
</div>

<script>
// ============ WORD LISTS BY DIFFICULTY ============
const wordSets = {
  easy: [
    { word: "TREE", hint: "A tall plant in the forest" },
    { word: "LEAF", hint: "It falls in autumn" },
    { word: "BIRD", hint: "It flies in the sky" },
    { word: "FROG", hint: "A green hopping creature" },
    { word: "FISH", hint: "It swims in the stream" },
    { word: "MOON", hint: "Shines at night" },
    { word: "STAR", hint: "Twinkles in the sky" },
    { word: "ROCK", hint: "A hard stone on the ground" },
    { word: "NEST", hint: "A bird's home" },
    { word: "SEED", hint: "Plant this to grow a flower" },
    { word: "RAIN", hint: "Water falling from clouds" },
    { word: "WIND", hint: "You can feel it but not see it" },
    { word: "MOSS", hint: "Soft green plant on rocks" },
    { word: "FAWN", hint: "A baby deer" },
    { word: "HARE", hint: "Like a rabbit but bigger" },
    { word: "BEAR", hint: "A big furry forest animal" },
    { word: "CAVE", hint: "A hole in the mountain" },
    { word: "PATH", hint: "A trail through the woods" },
    { word: "BARK", hint: "The outside of a tree trunk" },
    { word: "BUSH", hint: "A small leafy plant" },
  ],
  medium: [
    { word: "FOREST", hint: "A large area full of trees" },
    { word: "CASTLE", hint: "Where kings and queens live" },
    { word: "KNIGHT", hint: "A brave warrior in armor" },
    { word: "SHIELD", hint: "Protects a knight in battle" },
    { word: "BRIDGE", hint: "Cross over a river on this" },
    { word: "STREAM", hint: "A small flowing river" },
    { word: "MEADOW", hint: "An open grassy field" },
    { word: "RABBIT", hint: "A fluffy hopping animal" },
    { word: "FLOWER", hint: "A colorful bloom in the field" },
    { word: "SPIDER", hint: "It spins a web" },
    { word: "THRONE", hint: "A royal chair" },
    { word: "BRANCH", hint: "Part of a tree, not the trunk" },
    { word: "ACORN", hint: "An oak tree's seed" },
    { word: "HAWK", hint: "A bird of prey" },
    { word: "CROWN", hint: "Worn on a king's head" },
    { word: "ARMOR", hint: "Metal clothing for protection" },
    { word: "SWORD", hint: "A knight's long blade" },
    { word: "QUEST", hint: "A long journey with a mission" },
    { word: "TORCH", hint: "Gives light in dark places" },
    { word: "BRAVE", hint: "Not afraid of danger" },
  ],
  hard: [
    { word: "KINGDOM", hint: "A land ruled by a king" },
    { word: "COURAGE", hint: "Bravery in the face of fear" },
    { word: "ENCHANT", hint: "To put a magical spell on" },
    { word: "GUARDIAN", hint: "A protector or watchkeeper" },
    { word: "MYSTICAL", hint: "Full of magic and wonder" },
    { word: "CREATURE", hint: "A living being or animal" },
    { word: "TREASURE", hint: "Valuable things like gold and gems" },
    { word: "FORTRESS", hint: "A strong, protected building" },
    { word: "SQUIRREL", hint: "Collects nuts in trees" },
    { word: "MUSHROOM", hint: "Grows on the forest floor" },
    { word: "CHAMPION", hint: "The winner of a great contest" },
    { word: "STRENGTH", hint: "The power to lift heavy things" },
    { word: "PEACEFUL", hint: "Calm and without conflict" },
    { word: "WOODLAND", hint: "Another word for forest" },
    { word: "CHIVALRY", hint: "The code of noble knights" },
    { word: "LANTERN", hint: "A portable light" },
    { word: "JOURNEY", hint: "Traveling from place to place" },
    { word: "FEATHER", hint: "Light thing from a bird" },
    { word: "ANCIENT", hint: "Very very old" },
    { word: "POTTERY", hint: "Cups and bowls made of clay" },
  ]
};

// ============ GAME STATE ============
const state = {
  character: 'deer',
  score: 0,
  streak: 0,
  lives: 5,
  wordsCompleted: 0,
  wordList: [],
  currentWord: null,
  currentGuess: [],
  currentSlot: 0,
  phase: 'title', // title, roaming, challenge, result, gameover
  difficulty: 'easy',
  playerX: 0,
  playerY: 0,
  targetX: 0,
  targetY: 0,
  creatures: [],
  activeCreature: null,
  trees: [],
  particles: [],
  grassPatches: [],
  fireflies: [],
  time: 0,
  cameraX: 0,
  cameraY: 0,
  isTouching: false,
  touchX: 0,
  touchY: 0,
};

// ============ CANVAS SETUP ============
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 100));
resize();

// ============ FOREST GENERATION ============
function generateForest() {
  state.trees = [];
  state.grassPatches = [];
  state.fireflies = [];

  for (let i = 0; i < 120; i++) {
    state.trees.push({
      x: (Math.random() - 0.5) * 3000,
      y: (Math.random() - 0.5) * 3000,
      size: 30 + Math.random() * 40,
      shade: Math.random() * 0.3,
      sway: Math.random() * Math.PI * 2,
      type: Math.random() > 0.3 ? 'oak' : 'pine',
    });
  }

  for (let i = 0; i < 80; i++) {
    state.grassPatches.push({
      x: (Math.random() - 0.5) * 3000,
      y: (Math.random() - 0.5) * 3000,
      size: 10 + Math.random() * 20,
      sway: Math.random() * Math.PI * 2,
    });
  }

  for (let i = 0; i < 40; i++) {
    state.fireflies.push({
      x: (Math.random() - 0.5) * 2500,
      y: (Math.random() - 0.5) * 2500,
      phase: Math.random() * Math.PI * 2,
      speed: 0.3 + Math.random() * 0.5,
      radius: 20 + Math.random() * 30,
    });
  }
}

function spawnCreatures() {
  state.creatures = [];
  const types = ['deer', 'ram', 'cat', 'bat', 'owl', 'fox'];
  for (let i = 0; i < 6; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 200 + Math.random() * 400;
    state.creatures.push({
      type: types[Math.floor(Math.random() * types.length)],
      x: state.playerX + Math.cos(angle) * dist,
      y: state.playerY + Math.sin(angle) * dist,
      targetX: 0,
      targetY: 0,
      wanderTimer: Math.random() * 3,
      emoji: '',
    });
    const c = state.creatures[i];
    c.targetX = c.x;
    c.targetY = c.y;
    c.emoji = getCreatureEmoji(c.type);
  }
}

function getCreatureEmoji(type) {
  switch(type) {
    case 'deer': return '🦌';
    case 'ram': return '🐏';
    case 'cat': return '🐈';
    case 'bat': return '🦇';
    case 'owl': return '🦉';
    case 'fox': return '🦊';
    default: return '🐾';
  }
}

function getCharEmoji() {
  switch(state.character) {
    case 'deer': return '🦌';
    case 'ram': return '🐏';
    case 'cat': return '🐈';
  }
}

// ============ DIFFICULTY ============
function getDifficulty() {
  if (state.wordsCompleted < 5) return 'easy';
  if (state.wordsCompleted < 12) return 'medium';
  return 'hard';
}

function pickWord() {
  const diff = getDifficulty();
  const set = wordSets[diff];
  const available = set.filter(w => !state.wordList.includes(w.word));
  if (available.length === 0) {
    state.wordList = state.wordList.filter(w => !set.find(s => s.word === w));
    return set[Math.floor(Math.random() * set.length)];
  }
  return available[Math.floor(Math.random() * available.length)];
}

// ============ DRAWING ============
function drawForest() {
  // Ground
  ctx.fillStyle = '#1a3318';
  ctx.fillRect(0, 0, W, H);

  const cx = state.cameraX;
  const cy = state.cameraY;

  // Draw grass
  state.grassPatches.forEach(g => {
    const sx = g.x - cx + W/2;
    const sy = g.y - cy + H/2;
    if (sx < -50 || sx > W+50 || sy < -50 || sy > H+50) return;
    const sway = Math.sin(state.time * 2 + g.sway) * 3;
    ctx.strokeStyle = `rgba(60, 120, 40, 0.6)`;
    ctx.lineWidth = 2;
    for (let i = -1; i <= 1; i++) {
      ctx.beginPath();
      ctx.moveTo(sx + i * 5, sy);
      ctx.quadraticCurveTo(sx + i * 5 + sway, sy - g.size * 0.6, sx + i * 3 + sway * 1.5, sy - g.size);
      ctx.stroke();
    }
  });

  // Draw trees (sorted by y for depth)
  const sortedTrees = [...state.trees].sort((a, b) => a.y - b.y);
  sortedTrees.forEach(t => {
    const sx = t.x - cx + W/2;
    const sy = t.y - cy + H/2;
    if (sx < -100 || sx > W+100 || sy < -100 || sy > H+100) return;

    const sway = Math.sin(state.time * 0.8 + t.sway) * 2;

    // Trunk
    ctx.fillStyle = `rgb(${60 - t.shade*30}, ${40 - t.shade*20}, ${20})`;
    ctx.fillRect(sx - 4, sy - t.size * 0.5, 8, t.size * 0.7);

    // Foliage
    if (t.type === 'oak') {
      const g = Math.floor(100 + t.shade * 60);
      ctx.fillStyle = `rgb(${30 + t.shade*20}, ${g}, ${30})`;
      ctx.beginPath();
      ctx.arc(sx + sway, sy - t.size * 0.6, t.size * 0.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = `rgb(${20 + t.shade*15}, ${g - 15}, ${25})`;
      ctx.beginPath();
      ctx.arc(sx - t.size*0.2 + sway, sy - t.size * 0.8, t.size * 0.35, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(sx + t.size*0.2 + sway, sy - t.size * 0.75, t.size * 0.3, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // Pine
      const g = Math.floor(80 + t.shade * 50);
      for (let layer = 0; layer < 3; layer++) {
        const ly = sy - t.size * 0.3 - layer * t.size * 0.25;
        const lw = t.size * (0.5 - layer * 0.12);
        ctx.fillStyle = `rgb(${20 + t.shade*10}, ${g - layer*10}, ${30})`;
        ctx.beginPath();
        ctx.moveTo(sx + sway, ly - t.size * 0.25);
        ctx.lineTo(sx - lw + sway * 0.5, ly);
        ctx.lineTo(sx + lw + sway * 0.5, ly);
        ctx.closePath();
        ctx.fill();
      }
    }
  });

  // Draw creatures
  state.creatures.forEach(c => {
    const sx = c.x - cx + W/2;
    const sy = c.y - cy + H/2;
    if (sx < -50 || sx > W+50 || sy < -50 || sy > H+50) return;

    // Bat has a flying bob effect
    let drawY = sy;
    if (c.type === 'bat') {
      drawY += Math.sin(state.time * 4 + c.wanderTimer) * 8;
    }

    ctx.font = '32px serif';
    ctx.textAlign = 'center';
    ctx.fillText(c.emoji, sx, drawY);

    // Glow if nearby player
    const dx = c.x - state.playerX;
    const dy = c.y - state.playerY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 80 && state.phase === 'roaming') {
      ctx.strokeStyle = 'rgba(240, 208, 96, 0.4)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(sx, drawY - 8, 24, 0, Math.PI * 2);
      ctx.stroke();
    }
  });

  // Draw player
  const px = state.playerX - cx + W/2;
  const py = state.playerY - cy + H/2;

  // Player shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(px, py + 8, 16, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Knight
  ctx.font = '36px serif';
  ctx.textAlign = 'center';
  ctx.fillText(getCharEmoji(), px, py);

  // Knight helmet above
  ctx.font = '16px serif';
  ctx.fillText('⚔️', px, py - 24);

  // Fireflies
  state.fireflies.forEach(f => {
    const fx = f.x + Math.cos(state.time * f.speed + f.phase) * f.radius;
    const fy = f.y + Math.sin(state.time * f.speed * 0.7 + f.phase) * f.radius;
    const sx = fx - cx + W/2;
    const sy = fy - cy + H/2;
    if (sx < -20 || sx > W+20 || sy < -20 || sy > H+20) return;
    const glow = (Math.sin(state.time * 3 + f.phase) + 1) * 0.5;
    ctx.fillStyle = `rgba(200, 240, 80, ${glow * 0.8})`;
    ctx.beginPath();
    ctx.arc(sx, sy, 2 + glow, 0, Math.PI * 2);
    ctx.fill();
    if (glow > 0.5) {
      ctx.fillStyle = `rgba(200, 240, 80, ${glow * 0.15})`;
      ctx.beginPath();
      ctx.arc(sx, sy, 8, 0, Math.PI * 2);
      ctx.fill();
    }
  });

  // Particles
  state.particles.forEach(p => {
    const sx = p.x - cx + W/2;
    const sy = p.y - cy + H/2;
    ctx.fillStyle = `rgba(${p.r}, ${p.g}, ${p.b}, ${p.alpha})`;
    ctx.beginPath();
    ctx.arc(sx, sy, p.size, 0, Math.PI * 2);
    ctx.fill();
  });
}

// ============ PARTICLES ============
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    state.particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1,
      r: color[0], g: color[1], b: color[2],
      alpha: 1,
      size: 2 + Math.random() * 3,
      life: 1,
    });
  }
}

// ============ UPDATE ============
function update(dt) {
  state.time += dt;

  if (state.phase === 'roaming') {
    // Continuous touch movement
    if (state.isTouching) {
      state.targetX = state.touchX - W/2 + state.cameraX;
      state.targetY = state.touchY - H/2 + state.cameraY;
    }

    // Move player toward target
    const dx = state.targetX - state.playerX;
    const dy = state.targetY - state.playerY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > 3) {
      const speed = 150;
      state.playerX += (dx / dist) * speed * dt;
      state.playerY += (dy / dist) * speed * dt;
    }

    // Camera follow
    state.cameraX += (state.playerX - state.cameraX) * 3 * dt;
    state.cameraY += (state.playerY - state.cameraY) * 3 * dt;

    // Update creatures
    state.creatures.forEach(c => {
      c.wanderTimer -= dt;
      if (c.wanderTimer <= 0) {
        c.wanderTimer = 2 + Math.random() * 3;
        c.targetX = c.x + (Math.random() - 0.5) * 150;
        c.targetY = c.y + (Math.random() - 0.5) * 150;
      }

      // Bats move faster and more erratically
      const creatureSpeed = c.type === 'bat' ? 50 : 30;
      const cdx = c.targetX - c.x;
      const cdy = c.targetY - c.y;
      const cdist = Math.sqrt(cdx*cdx + cdy*cdy);
      if (cdist > 2) {
        c.x += (cdx / cdist) * creatureSpeed * dt;
        c.y += (cdy / cdist) * creatureSpeed * dt;
      }

      // Check proximity to player
      const pdx = c.x - state.playerX;
      const pdy = c.y - state.playerY;
      const pdist = Math.sqrt(pdx*pdx + pdy*pdy);
      if (pdist < 55) {
        startChallenge(c);
      }
    });
  }

  // Update particles
  state.particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05;
    p.life -= dt * 1.5;
    p.alpha = Math.max(0, p.life);
  });
  state.particles = state.particles.filter(p => p.life > 0);
}

// ============ CHALLENGE SYSTEM ============
function startChallenge(creature) {
  state.phase = 'challenge';
  state.activeCreature = creature;
  state.currentWord = pickWord();
  state.currentGuess = [];
  state.currentSlot = 0;
  state.isTouching = false;

  // Hide move hint during challenge
  document.getElementById('move-hint').style.opacity = '0';

  const encounterTexts = [
    `A wild ${creature.type} blocks your path!`,
    `${creature.emoji} challenges you, brave knight!`,
    `You encounter a ${creature.type} in the woods!`,
    `A ${creature.type} appears from the shadows!`,
  ];

  document.getElementById('encounter-text').textContent =
    encounterTexts[Math.floor(Math.random() * encounterTexts.length)];
  document.getElementById('word-hint').textContent = `"${state.currentWord.hint}"`;

  // Build letter slots
  const display = document.getElementById('letter-display');
  display.innerHTML = '';
  for (let i = 0; i < state.currentWord.word.length; i++) {
    const slot = document.createElement('div');
    slot.className = 'letter-slot';
    slot.id = `slot-${i}`;
    display.appendChild(slot);
  }

  // Build keyboard
  buildKeyboard();

  document.getElementById('challenge-box').style.display = 'flex';
}

function buildKeyboard() {
  const rows = ['QWERTYUIOP', 'ASDFGHJKL', 'ZXCVBNM'];
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  rows.forEach(row => {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'row';
    for (const letter of row) {
      const key = document.createElement('div');
      key.className = 'key';
      key.textContent = letter;
      key.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        handleLetterInput(letter);
      });
      key.addEventListener('touchend', (e) => {
        e.preventDefault();
        e.stopPropagation();
        handleLetterInput(letter);
      });
      rowDiv.appendChild(key);
    }
    kb.appendChild(rowDiv);
  });
}

function handleLetterInput(letter) {
  if (state.phase !== 'challenge') return;
  if (state.currentSlot >= state.currentWord.word.length) return;

  const correctLetter = state.currentWord.word[state.currentSlot];
  const slot = document.getElementById(`slot-${state.currentSlot}`);

  if (letter === correctLetter) {
    slot.textContent = letter;
    slot.className = 'letter-slot filled correct';
    state.currentGuess.push(letter);
    state.currentSlot++;

    if (state.currentSlot >= state.currentWord.word.length) {
      setTimeout(() => wordSuccess(), 400);
    }
  } else {
    slot.className = 'letter-slot wrong';
    setTimeout(() => {
      slot.className = 'letter-slot';
    }, 400);
    state.lives--;
    updateHUD();
    spawnParticles(state.playerX, state.playerY - 20, [200, 50, 50], 8);

    if (state.lives <= 0) {
      setTimeout(() => gameOver(), 600);
    }
  }
}

function wordSuccess() {
  state.phase = 'result';
  state.score += state.currentWord.word.length * 10 * (1 + state.streak * 0.5);
  state.streak++;
  state.wordsCompleted++;
  state.wordList.push(state.currentWord.word);

  document.getElementById('challenge-box').style.display = 'none';

  const popup = document.getElementById('result-popup');
  popup.className = 'success';
  popup.style.display = 'flex';
  document.getElementById('result-icon').textContent = '✨';
  document.getElementById('result-text').textContent = getSuccessText();
  document.getElementById('result-text').style.color = '#90ee90';
  document.getElementById('result-word').textContent = state.currentWord.word;
  document.getElementById('result-word').style.color = '#f0d060';

  spawnParticles(state.playerX, state.playerY - 20, [240, 208, 96], 20);
  spawnParticles(state.playerX, state.playerY - 20, [100, 240, 100], 15);

  // Remove creature and spawn new one
  const idx = state.creatures.indexOf(state.activeCreature);
  if (idx >= 0) state.creatures.splice(idx, 1);
  setTimeout(() => {
    spawnNewCreature();
  }, 500);

  updateHUD();

  setTimeout(() => {
    popup.style.display = 'none';
    state.phase = 'roaming';
    updateLevelText();
  }, 1800);
}

function getSuccessText() {
  const texts = ['Well spelled!', 'Excellent!', 'Noble work!', 'The forest rejoices!', 'A true knight of words!'];
  return texts[Math.floor(Math.random() * texts.length)];
}

function spawnNewCreature() {
  const types = ['deer', 'ram', 'cat', 'bat', 'owl', 'fox'];
  const angle = Math.random() * Math.PI * 2;
  const dist = 250 + Math.random() * 350;
  const c = {
    type: types[Math.floor(Math.random() * types.length)],
    x: state.playerX + Math.cos(angle) * dist,
    y: state.playerY + Math.sin(angle) * dist,
    targetX: 0,
    targetY: 0,
    wanderTimer: Math.random() * 3,
  };
  c.targetX = c.x;
  c.targetY = c.y;
  c.emoji = getCreatureEmoji(c.type);
  state.creatures.push(c);
}

function gameOver() {
  state.phase = 'gameover';
  document.getElementById('challenge-box').style.display = 'none';
  document.getElementById('result-popup').style.display = 'none';
  document.getElementById('final-score').textContent = `Final Score: ${Math.floor(state.score)}`;
  document.getElementById('words-learned').textContent = `Words spelled: ${state.wordsCompleted} | ${state.wordList.join(', ')}`;
  document.getElementById('game-over').style.display = 'flex';
}

function updateHUD() {
  document.getElementById('score-text').textContent = `Score: ${Math.floor(state.score)}`;
  document.getElementById('streak-text').textContent = state.streak > 1 ? `🔥 ${state.streak} streak!` : '';
  let hearts = '';
  for (let i = 0; i < 5; i++) {
    hearts += i < state.lives ? '❤️' : '🖤';
  }
  document.getElementById('hearts').innerHTML = hearts;
}

function updateLevelText() {
  const diff = getDifficulty();
  const names = { easy: 'Forest Clearing', medium: 'Deep Woods', hard: 'Enchanted Grove' };
  document.getElementById('level-text').textContent = names[diff];
}

// ============ INPUT — Mouse ============
canvas.addEventListener('click', (e) => {
  if (state.phase === 'roaming') {
    state.targetX = e.clientX - W/2 + state.cameraX;
    state.targetY = e.clientY - H/2 + state.cameraY;
  }
});

// ============ INPUT — Touch (mobile) ============
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (state.phase === 'roaming') {
    const t = e.touches[0];
    state.isTouching = true;
    state.touchX = t.clientX;
    state.touchY = t.clientY;
    state.targetX = t.clientX - W/2 + state.cameraX;
    state.targetY = t.clientY - H/2 + state.cameraY;
    // Hide hint after first touch
    const hint = document.getElementById('move-hint');
    if (hint.style.opacity !== '0') {
      hint.style.opacity = '0';
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (state.phase === 'roaming' && state.isTouching) {
    const t = e.touches[0];
    state.touchX = t.clientX;
    state.touchY = t.clientY;
  }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  state.isTouching = false;
}, { passive: false });

canvas.addEventListener('touchcancel', (e) => {
  state.isTouching = false;
}, { passive: false });

// Prevent default touch behaviors on the whole page to avoid scroll/zoom
document.addEventListener('touchmove', (e) => {
  if (state.phase !== 'title' && state.phase !== 'gameover') {
    e.preventDefault();
  }
}, { passive: false });

// ============ INPUT — Keyboard ============
document.addEventListener('keydown', (e) => {
  if (state.phase === 'challenge') {
    const key = e.key.toUpperCase();
    if (key.length === 1 && key >= 'A' && key <= 'Z') {
      handleLetterInput(key);
    }
  }
});

// ============ TITLE SCREEN ============
document.querySelectorAll('.char-option').forEach(opt => {
  opt.addEventListener('click', () => {
    document.querySelectorAll('.char-option').forEach(o => o.classList.remove('selected'));
    opt.classList.add('selected');
    state.character = opt.dataset.char;
  });
});

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('play-again-btn').addEventListener('click', () => {
  document.getElementById('game-over').style.display = 'none';
  document.getElementById('title-screen').style.display = 'flex';
});

function startGame() {
  state.score = 0;
  state.streak = 0;
  state.lives = 5;
  state.wordsCompleted = 0;
  state.wordList = [];
  state.playerX = 0;
  state.playerY = 0;
  state.targetX = 0;
  state.targetY = 0;
  state.cameraX = 0;
  state.cameraY = 0;
  state.particles = [];
  state.isTouching = false;

  generateForest();
  spawnCreatures();
  updateHUD();
  updateLevelText();

  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('hud').style.display = 'flex';

  // Show touch hint on mobile
  const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
  const hint = document.getElementById('move-hint');
  if (isMobile) {
    hint.textContent = 'Tap & hold to move your knight';
    hint.style.opacity = '1';
    setTimeout(() => { hint.style.opacity = '0'; }, 4000);
  } else {
    hint.textContent = 'Click to move your knight';
    hint.style.opacity = '1';
    setTimeout(() => { hint.style.opacity = '0'; }, 3000);
  }

  state.phase = 'roaming';
}

// ============ GAME LOOP ============
let lastTime = 0;
function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  update(dt);
  drawForest();

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
